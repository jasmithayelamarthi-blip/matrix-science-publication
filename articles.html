<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research articles — Matrix Science Publication</title>
  <meta name="description" content="Browse peer-reviewed research articles, reviews and perspectives across physics, biology, chemistry, astrophysics and biotechnology.">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div id="site-header"></div>

  <main id="main">
    <header class="page-hero">
      <div class="wrap">
        <div class="crumb"><a href="index.html">Home</a> › Research articles</div>
        <h1>Research articles</h1>
        <p>Peer-reviewed work by high-school scientists from around the world. Filter by article type, subject and year.</p>
      </div>
    </header>

    <section class="section" id="current">
      <div class="wrap">
        <div class="filters">
          <div class="filter">
            <label for="fType">Article type</label>
            <select id="fType"></select>
          </div>
          <div class="filter">
            <label for="fSubject">Subject</label>
            <select id="fSubject"></select>
          </div>
          <div class="filter">
            <label for="fYear">Year</label>
            <select id="fYear"></select>
          </div>
          <span class="filter-count" id="articleCount"></span>
        </div>
        <p id="searchNote" class="form-note" style="display:none"></p>
        <ul class="article-list" id="articleList"></ul>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="js/data.js"></script>
  <script src="js/render.js"></script>
  <script src="js/components.js"></script>
  <script src="js/articles.js"></script>
</body>
</html>
