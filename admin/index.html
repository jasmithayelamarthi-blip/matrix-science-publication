<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrix Science Publication — Editor Dashboard</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
  <!-- Netlify Identity: lets invited editors log in -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <!-- Decap CMS is the actively maintained build of Netlify CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', function (user) {
        if (!user) {
          window.netlifyIdentity.on('login', function () { document.location.href = '/admin/'; });
        }
      });
    }
  </script>
</body>
</html>
