<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Science Wordle — Matrix Science Publication</title>
  <meta name="description" content="Play Science Wordle: guess the 5-letter science word in six tries and learn a fun science fact.">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div id="site-header"></div>

  <main id="main">
    <div class="wordle-wrap">
      <h1>Science Wordle</h1>
      <p class="tagline">Guess the hidden 5-letter science word in six tries. Win or lose, you’ll learn something.</p>

      <div class="wordle-board" id="wordleBoard" aria-label="Wordle board"></div>
      <div class="wordle-message" id="wordleMessage" role="status" aria-live="polite"></div>
      <div class="keyboard" id="keyboard" aria-label="On-screen keyboard"></div>

      <div class="fact-card" id="factCard" aria-live="polite"></div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="js/data.js"></script>
  <script src="js/render.js"></script>
  <script src="js/components.js"></script>
  <script src="js/wordle.js"></script>
</body>
</html>
