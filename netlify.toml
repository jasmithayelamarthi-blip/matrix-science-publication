# Matrix Science Publication — Netlify configuration
# Pure static site: no build step needed, the repo root is published as-is.

[build]
  publish = "."
  command = ""

# Friendly redirect so /admin and /admin/ both reach the CMS dashboard.
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# Security & caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Never cache the article index so newly published articles appear immediately.
[[headers]]
  for = "/content/articles.json"
  [headers.values]
    Cache-Control = "no-cache"
